JOY INFO PURGE 24 PRODUCTION 
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO PURGE 24 - Classement des clans</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0000 0%, #000000 100%);
            color: #ff0000;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* En-tête avec effet live */
        .live-header {
            background: #0a0000;
            border-bottom: 2px solid #ff0000;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 15px 15px 0 0;
        }

        .live-badge {
            display: inline-block;
            background: #ff0000;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 1s infinite;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        h1 {
            font-size: 32px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ff0000;
        }

        .citation {
            color: #ff4444;
            font-style: italic;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Section classement */
        .section-title {
            font-size: 20px;
            margin: 30px 0 15px 0;
            border-left: 4px solid #ff0000;
            padding-left: 15px;
        }

        /* Cartes joueurs (comme sur ta capture) */
        .players-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-card {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .rank {
            font-size: 24px;
            font-weight: bold;
            width: 50px;
            text-align: center;
        }

        .rank-1 { color: #FFD700; text-shadow: 0 0 5px #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }

        .player-name {
            font-size: 18px;
            font-weight: bold;
        }

        .player-badge {
            background: #330000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: #ff8888;
        }

        .player-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .points {
            font-size: 20px;
            font-weight: bold;
        }

        .likes {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #1a0000;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .like-btn {
            background: transparent;
            border: none;
            color: #ff0000;
            cursor: pointer;
            font-size: 16px;
        }

        .like-btn:hover {
            transform: scale(1.1);
        }

        /* Forum */
        .forum {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            margin-top: 40px;
        }

        .forum h3 {
            margin-bottom: 15px;
            border-left: 3px solid #ff0000;
            padding-left: 10px;
        }

        .message {
            background: #0a0a0a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 3px solid #ff0000;
        }

        .message-author {
            color: #ff8888;
            font-size: 11px;
        }

        .message-content {
            color: #cccccc;
            font-size: 13px;
        }

        .message-date {
            color: #660000;
            font-size: 9px;
            text-align: right;
            margin-top: 5px;
        }

        .form-message {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .form-message input {
            flex: 3;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            border-radius: 8px;
        }

        .form-message button {
            flex: 1;
            background: #ff0000;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #440000;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- En-tête avec effet live -->
        <div class="live-header">
            <div class="live-badge">🔴 EN DIRECT</div>
            <h1>⚔️ INFO PURGE 24 ⚔️</h1>
            <div class="citation">"Le respect ne se demande pas, il s'impose" - Joyboy</div>
        </div>

        <!-- Classement des joueurs -->
        <div class="section-title">🏆 CLASSEMENT OFFICIEL DES PURGEURS 🏆</div>
        <div class="players-grid" id="playersGrid"></div>

        <!-- Forum -->
        <div class="forum">
            <h3>💬 FORUM PURGE 24</h3>
            <div id="forumMessages"></div>
            <div class="form-message">
                <input type="text" id="messageInput" placeholder="Écris un message...">
                <button onclick="posterMessage()">POSTER</button>
            </div>
        </div>

        <div class="footer">
            INFO PURGE 24 · LE JOURNAL DES CLANS · ÉDITION SPÉCIALE
        </div>
    </div>

    <script>
        // ========== DONNÉES DES JOUEURS ==========
        let joueurs = [
            { id: 1, pseudo: "JIN WOO", badge: "WORKER", points: 21, likes: 4, rank: 9 },
            { id: 2, pseudo: "LORD IZANA", badge: "Solitaire", points: 216, likes: 0, rank: 10 },
            { id: 3, pseudo: "JOYBOY", badge: "ADMIN", points: 1250, likes: 42, rank: 1 },
            { id: 4, pseudo: "ZETSU", badge: "PURGEUR", points: 980, likes: 31, rank: 2 },
            { id: 5, pseudo: "NEXTLIGH", badge: "OMBRE", points: 720, likes: 24, rank: 3 }
        ];

        // ========== MESSAGES DU FORUM ==========
        let messages = [];

        // Charger les messages sauvegardés
        function chargerMessages() {
            const saved = localStorage.getItem('purge_forum');
            if(saved) {
                messages = JSON.parse(saved);
            } else {
                messages = [
                    { auteur: "JOYBOY ADMIN", contenu: "Bienvenue sur le forum PURGE 24. 'Le respect ne se demande pas, il s'impose'", date: new Date().toLocaleString() }
                ];
            }
            afficherMessages();
        }

        function afficherMessages() {
            const container = document.getElementById('forumMessages');
            if(messages.length === 0) {
                container.innerHTML = '<div class="message"><div class="message-author">⚔️ SYSTÈME</div><div class="message-content">Aucun message pour le moment</div><div class="message-date">-</div></div>';
                return;
            }
            container.innerHTML = messages.slice(0, 30).map(msg => `
                <div class="message">
                    <div class="message-author">⚔️ ${msg.auteur}</div>
                    <div class="message-content">${msg.contenu}</div>
                    <div class="message-date">${msg.date}</div>
                </div>
            `).join('');
        }

        function posterMessage() {
            const input = document.getElementById('messageInput');
            const contenu = input.value.trim();
            if(!contenu) return;
            
            messages.unshift({
                auteur: "PURGEUR",
                contenu: contenu,
                date: new Date().toLocaleString()
            });
            if(messages.length > 50) messages.pop();
            localStorage.setItem('purge_forum', JSON.stringify(messages));
            afficherMessages();
            input.value = '';
        }

        // ========== AFFICHAGE DES JOUEURS ==========
        function afficherJoueurs() {
            const container = document.getElementById('playersGrid');
            container.innerHTML = joueurs.map(j => `
                <div class="player-card">
                    <div class="player-info">
                        <div class="rank ${getRankClass(j.rank)}">#${j.rank}</div>
                        <div class="player-name">${j.pseudo}</div>
                        <div class="player-badge">${j.badge}</div>
                    </div>
                    <div class="player-stats">
                        <div class="points">${j.points} POINTS</div>
                        <div class="likes">
                            <span>❤️ ${j.likes}</span>
                            <button class="like-btn" onclick="liker(${j.id})">+1</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getRankClass(rank) {
            if(rank === 1) return 'rank-1';
            if(rank === 2) return 'rank-2';
            if(rank === 3) return 'rank-3';
            return '';
        }

        function liker(id) {
            const joueur = joueurs.find(j => j.id === id);
            if(joueur) {
                joueur.likes++;
                joueur.points += 5;
                afficherJoueurs();
                // Ajouter un message dans le forum
                messages.unshift({
                    auteur: "SYSTÈME",
                    contenu: `❤️ ${joueur.pseudo} a reçu un like ! +5 points`,
                    date: new Date().toLocaleString()
                });
                if(messages.length > 50) messages.pop();
                localStorage.setItem('purge_forum', JSON.stringify(messages));
                afficherMessages();
            }
        }

        // Initialisation
        chargerMessages();
        afficherJoueurs();
    </script>
</body>
</html>
