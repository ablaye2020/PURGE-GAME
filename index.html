<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>INFO PURGE 24 - Le Journal des Clans</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }
        
        /* BANDEAU ROUGE */
        .red-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #8B0000, #cc0000, #8B0000);
            color: #FFD700;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            font-weight: bold;
            padding: 12px 0;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid #FFD700;
            letter-spacing: 2px;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 80px;
        }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1a1a1a, #2a0000);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #8B0000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .live-badge {
            display: inline-block;
            background: #cc0000;
            color: #FFD700;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 30px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5em;
            font-weight: 700;
            letter-spacing: 5px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(204,0,0,0.5);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #ff8888;
            font-size: 0.9em;
            letter-spacing: 3px;
        }
        
        .citation {
            font-style: italic;
            font-size: 1em;
            color: #FFD700;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #8B0000;
            display: inline-block;
        }
        
        /* NAVIGATION */
        .nav {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .nav-btn {
            background: transparent;
            border: 2px solid #8B0000;
            padding: 12px 35px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 50px;
            font-size: 1em;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #8B0000, #cc0000);
            border-color: #FFD700;
            color: white;
        }
        
        /* SECTIONS */
        .section {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* TABS CLASSEMENT */
        .ranking-tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: rgba(139,0,0,0.3);
            border: 1px solid #8B0000;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: #FFD700;
            transition: all 0.3s;
            font-size: 1em;
        }
        
        .tab-btn:hover {
            background: #8B0000;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #8B0000, #cc0000);
            border-color: #FFD700;
            color: white;
        }
        
        /* GRILLE DES CLANS */
        .clans-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .clan-card {
            background: linear-gradient(95deg, #1a1a1a 0%, #2a0a0a 100%);
            border: 1px solid #8B0000;
            border-radius: 15px;
            padding: 20px 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .clan-card:hover {
            transform: translateX(8px);
            border-color: #FFD700;
            box-shadow: 0 5px 20px rgba(204,0,0,0.3);
        }
        
        .clan-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: linear-gradient(135deg, #8B0000, #FFD700);
        }
        
        .clan-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .clan-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 2;
        }
        
        .clan-rank {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2em;
            font-weight: bold;
            color: #FFD700;
            min-width: 60px;
        }
        
        .clan-icon {
            font-size: 2.5em;
        }
        
        .clan-details {
            flex: 1;
        }
        
        .clan-name {
            font-size: 1.4em;
            font-weight: 700;
            color: #FFD700;
            font-family: 'Cormorant Garamond', serif;
        }
        
        .clan-leader {
            font-size: 0.8em;
            color: #ff8888;
            margin-top: 3px;
        }
        
        .clan-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(139,0,0,0.3);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85em;
            font-weight: 600;
            color: #FFD700;
        }
        
        .clan-points {
            font-size: 1.3em;
            font-weight: bold;
            color: #FFD700;
            font-family: 'Cormorant Garamond', serif;
            min-width: 120px;
            text-align: right;
        }
        
        .like-btn {
            background: rgba(139,0,0,0.5);
            border: 1px solid #FFD700;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: #FFD700;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .like-btn:hover {
            background: #8B0000;
            transform: scale(1.05);
        }
        
        /* FORUM */
        .forum-form {
            background: #1a1a1a;
            border: 1px solid #8B0000;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .forum-form input, .forum-form textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #8B0000;
            background: #0a0a0a;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        
        .forum-form input:focus, .forum-form textarea:focus {
            outline: none;
            border-color: #FFD700;
        }
        
        .forum-message {
            background: #1a1a1a;
            border: 1px solid #8B0000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .forum-message:hover {
            border-color: #FFD700;
        }
        
        .forum-author {
            color: #FFD700;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .forum-date {
            font-size: 0.7em;
            color: #ff8888;
        }
        
        .forum-content {
            margin: 12px 0;
            line-height: 1.5;
        }
        
        .forum-like {
            background: transparent;
            border: 1px solid #8B0000;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            color: #FFD700;
            margin-top: 10px;
        }
        
        .forum-like:hover {
            background: #8B0000;
        }
        
        /* BOUTONS GÉNÉRAUX */
        .btn-gold {
            background: linear-gradient(135deg, #8B0000, #cc0000);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: #FFD700;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(204,0,0,0.4);
        }
        
        .refresh-btn {
            background: rgba(139,0,0,0.3);
            border: 1px solid #8B0000;
            padding: 8px 25px;
            border-radius: 30px;
            color: #FFD700;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        /* ADMIN LINK */
        .admin-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1a1a1a;
            border: 1px solid #8B0000;
            padding: 10px 20px;
            border-radius: 30px;
            color: #FFD700;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
            transition: all 0.3s;
        }
        
        .admin-link:hover {
            background: #8B0000;
            color: white;
        }
        
        /* MUSIC CONTROL */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 1px solid #8B0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            z-index: 100;
            color: #FFD700;
        }
        
        .music-control:hover {
            background: #8B0000;
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .clan-row { flex-direction: column; text-align: center; }
            .clan-info { flex-direction: column; text-align: center; }
            .clan-points { text-align: center; }
            .stat { font-size: 0.7em; }
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="red-banner">
        🔴 JOY INFO PURGE 24 PRODUCTION 🔴
    </div>
    
    <div class="container">
        <a href="admin.html" class="admin-link">👑 JOYBOY ADMIN</a>
        <div class="music-control" onclick="toggleMusic()" id="musicBtn">🎵</div>
        
        <div class="header">
            <div class="live-badge">🔴 EN DIRECT</div>
            <h1>⚜️ INFO PURGE 24 ⚜️</h1>
            <div class="subtitle">LE JOURNAL DES CLANS · ÉDITION SPÉCIALE</div>
            <div class="citation">"Le respect ne se demande pas, il s'impose" - Joyboy</div>
            <div class="nav">
                <button class="nav-btn active" onclick="showSection('ranking')">🏆 CLASSEMENT OFFICIEL</button>
                <button class="nav-btn" onclick="showSection('forum')">💬 FORUM PURGE</button>
            </div>
        </div>

        <div id="ranking" class="section active">
            <div class="ranking-tabs">
                <button class="tab-btn active" onclick="showRankingPeriod('week', this)">📅 CLASSEMENT SEMAINE</button>
                <button class="tab-btn" onclick="showRankingPeriod('month', this)">📆 CLASSEMENT MOIS</button>
                <button class="tab-btn" onclick="showRankingPeriod('year', this)">🗓️ CLASSEMENT ANNÉE</button>
            </div>
            <button class="refresh-btn" onclick="loadClans()">🔄 RAFRAÎCHIR</button>
            <div id="rankingList" class="clans-grid">⏳ Chargement...</div>
        </div>

        <div id="forum" class="section">
            <div class="forum-form">
                <input type="text" id="authorName" placeholder="Votre pseudo" required>
                <textarea id="forumMessage" placeholder="Votre message" rows="3" required></textarea>
                <button class="btn-gold" onclick="publishMessage()">📢 PUBLIER</button>
            </div>
            <div id="forumMessages">⏳ Chargement...</div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3yYAuiGqbtrbZ1aSYxAjduZ65adNIpag",
            authDomain: "purge-game-58718.firebaseapp.com",
            databaseURL: "https://purge-game-58718-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "purge-game-58718",
            storageBucket: "purge-game-58718.firebasestorage.app",
            messagingSenderId: "554574972856",
            appId: "1:554574972856:web:9de17e7f77eb7b5be4b14d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let currentClans = [];
        let currentPeriod = 'week';
        let backgroundMusic = null;
        let musicPlaying = false;
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        function showTempMessage(msg, isError) {
            const div = document.createElement('div');
            div.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:${isError ? '#8B0000' : '#FFD700'}; color:${isError ? 'white' : '#000'}; padding:10px 20px; border-radius:30px; z-index:2000; animation:fadeOut 2s ease forwards; font-weight:bold;`;
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }
        
        async function loadClans() {
            try {
                const snapshot = await database.ref('clans').once('value');
                const clansMap = new Map();
                snapshot.forEach(child => {
                    const clan = child.val();
                    if(!clansMap.has(clan.name)) {
                        clan.id = child.key;
                        clansMap.set(clan.name, clan);
                    }
                });
                currentClans = Array.from(clansMap.values());
                updateRanking();
            } catch(e) {
                document.getElementById('rankingList').innerHTML = '<div class="loading">❌ Erreur de chargement</div>';
            }
        }
        
        function updateRanking() {
            let clans = [...currentClans];
            
            if(currentPeriod === 'week') clans.sort((a,b) => (b.score_week || 0) - (a.score_week || 0));
            else if(currentPeriod === 'month') clans.sort((a,b) => (b.score_month || 0) - (a.score_month || 0));
            else clans.sort((a,b) => (b.score_year || 0) - (a.score_year || 0));
            
            const container = document.getElementById('rankingList');
            if(clans.length === 0) {
                container.innerHTML = '<div class="loading">🏆 Aucun clan enregistré</div>';
                return;
            }
            
            const periodLabel = currentPeriod === 'week' ? 'SEMAINE' : (currentPeriod === 'month' ? 'MOIS' : 'ANNÉE');
            
            container.innerHTML = clans.map((clan, idx) => {
                const score = currentPeriod === 'week' ? (clan.score_week || 0) : (currentPeriod === 'month' ? (clan.score_month || 0) : (clan.score_year || 0));
                const icons = ['⚔️', '🛡️', '👑', '🏰', '🐉', '⚡', '🔥', '💀', '🦅', '🐺', '🦁', '🗡️'];
                return `
                    <div class="clan-card">
                        <div class="clan-row">
                            <div class="clan-info">
                                <div class="clan-rank">#${idx+1}</div>
                                <div class="clan-icon">${icons[idx % icons.length]}</div>
                                <div class="clan-details">
                                    <div class="clan-name">${escapeHtml(clan.name)}</div>
                                    <div class="clan-leader">👑 ${escapeHtml(clan.leader)}</div>
                                </div>
                            </div>
                            <div class="clan-stats">
                                <span class="stat">📅 S: ${clan.score_week || 0}</span>
                                <span class="stat">📆 M: ${clan.score_month || 0}</span>
                                <span class="stat">🗓️ A: ${clan.score_year || 0}</span>
                                <span class="stat">❤️ ${clan.likes || 0}</span>
                            </div>
                            <div class="clan-points">⭐ ${score} pts</div>
                            <button class="like-btn" onclick="likeClan('${clan.id}')">❤️ LIKER</button>
                        </div>
                        ${clan.description ? `<div style="margin-top:10px; font-size:12px; color:#ff8888;">📝 ${escapeHtml(clan.description)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        async function likeClan(id) {
            const clanRef = database.ref(`clans/${id}`);
            const snapshot = await clanRef.once('value');
            const clan = snapshot.val();
            if(clan) {
                await clanRef.update({ likes: (clan.likes || 0) + 1 });
                showTempMessage("❤️ Like enregistré !");
                loadClans();
            }
        }
        
        async function loadForum() {
            const snapshot = await database.ref('forum').once('value');
            const messages = [];
            snapshot.forEach(child => messages.push({ id: child.key, ...child.val() }));
            messages.reverse();
            
            const container = document.getElementById('forumMessages');
            if(messages.length === 0) {
                container.innerHTML = '<div class="loading">💬 Aucun message, soyez le premier !</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="forum-message">
                    <div class="forum-author">
                        🔥 <strong>${escapeHtml(msg.author)}</strong>
                        <span class="forum-date">${msg.date || ''}</span>
                    </div>
                    <div class="forum-content">${escapeHtml(msg.message)}</div>
                    <button class="forum-like" onclick="likeMessage('${msg.id}')">❤️ ${msg.likes || 0} likes</button>
                </div>
            `).join('');
        }
        
        async function likeMessage(id) {
            const msgRef = database.ref(`forum/${id}`);
            const snapshot = await msgRef.once('value');
            const msg = snapshot.val();
            if(msg) {
                await msgRef.update({ likes: (msg.likes || 0) + 1 });
                showTempMessage("💬 Like enregistré !");
                loadForum();
            }
        }
        
        async function publishMessage() {
            const author = document.getElementById('authorName').value;
            const message = document.getElementById('forumMessage').value;
            if(!author || !message) { showTempMessage("❌ Pseudo et message requis", true); return; }
            await database.ref('forum').push({ author, message, likes: 0, date: new Date().toLocaleString() });
            showTempMessage("✅ Message publié !");
            document.getElementById('authorName').value = '';
            document.getElementById('forumMessage').value = '';
            loadForum();
        }
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(section === 'ranking') loadClans();
            if(section === 'forum') loadForum();
        }
        
        function showRankingPeriod(period, btn) {
            currentPeriod = period;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateRanking();
        }
        
        function initMusic() {
            backgroundMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
            backgroundMusic.loop = true;
            backgroundMusic.volume = 0.1;
        }
        
        function toggleMusic() {
            if(!backgroundMusic) initMusic();
            if(musicPlaying) {
                backgroundMusic.pause();
                musicPlaying = false;
                document.getElementById('musicBtn').innerHTML = '🎵';
            } else {
                backgroundMusic.play().catch(e => {});
                musicPlaying = true;
                document.getElementById('musicBtn').innerHTML = '🎵🔊';
            }
        }
        
        document.body.addEventListener('click', () => {
            if(!musicPlaying && backgroundMusic) {
                backgroundMusic.play().catch(e => {});
                musicPlaying = true;
                document.getElementById('musicBtn').innerHTML = '🎵🔊';
            }
        }, { once: true });
        
        initMusic();
        loadClans();
        loadForum();
        setInterval(() => { loadClans(); loadForum(); }, 20000);
        
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeOut { 0% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
