INFO PURGE ADMIN 
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>INFO PURGE 24 - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 30px;
        }
        
        .admin-header {
            background: linear-gradient(135deg, #1a0000, #2a0a0a);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #FFD700;
        }
        
        h1 {
            font-family: 'Cinzel', serif;
            color: #FFD700;
            font-size: 2em;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .stat-card {
            background: rgba(139,0,0,0.3);
            border-radius: 15px;
            padding: 12px 25px;
            text-align: center;
            border: 1px solid #FFD700;
        }
        
        .stat-card span {
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            font-family: 'Cinzel', serif;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        button {
            background: linear-gradient(135deg, #8B0000, #cc0000);
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            color: #FFD700;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(204,0,0,0.4); }
        
        .card {
            background: #1a1a1a;
            border: 1px solid #8B0000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .card h2 {
            font-family: 'Cinzel', serif;
            color: #FFD700;
            margin-bottom: 20px;
            border-left: 4px solid #FFD700;
            padding-left: 15px;
        }
        
        .clan-card {
            background: linear-gradient(95deg, #121212, #1a0505);
            border: 1px solid #8B0000;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
        }
        
        .clan-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #FFD700;
            font-family: 'Cinzel', serif;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
        }
        
        .status-badge.pending { background: #f39c12; color: #000; }
        .status-badge.approved { background: #27ae60; color: #fff; }
        .status-badge.rejected { background: #c0392b; color: #fff; }
        
        .photos-preview {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .photos-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .admin-actions input {
            background: #0a0a0a;
            border: 1px solid #FFD700;
            padding: 8px;
            border-radius: 8px;
            color: white;
            width: 100px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #FFD700;
        }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1a1a;
            border: 2px solid #FFD700;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
        }
        
        .pin-input {
            font-size: 32px;
            text-align: center;
            letter-spacing: 10px;
            width: 200px;
            margin: 20px auto;
            background: #0a0a0a;
            border: 2px solid #8B0000;
            color: #FFD700;
            padding: 10px;
            border-radius: 15px;
        }
        
        @media (max-width: 768px) {
            .photos-preview img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="login-box">
            <div class="login-logo" style="font-size:50px;">👑</div>
            <h2 style="color:#FFD700;">ADMIN PANEL</h2>
            <input type="password" id="pinCode" class="pin-input" maxlength="4" placeholder="****">
            <button onclick="checkPin()" style="width:100%; margin-top:20px;">🔐 SE CONNECTER</button>
            <div id="loginError" style="color:#ff8888; margin-top:15px;"></div>
            <a href="index.html" style="color:#FFD700; display:block; margin-top:20px;">← Retour au site</a>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="admin-header">
                <h1>⚜️ PANEL ADMIN INFO PURGE 24 ⚜️</h1>
                <div class="stats-bar">
                    <div class="stat-card"><span id="statPending">0</span><br>En attente</div>
                    <div class="stat-card"><span id="statApproved">0</span><br>Approuvées</div>
                    <div class="stat-card"><span id="statRejected">0</span><br>Rejetées</div>
                </div>
                <div class="btn-group">
                    <button onclick="logout()">🚪 DÉCONNEXION</button>
                    <a href="index.html"><button>🏠 VOIR LE SITE</button></a>
                </div>
            </div>

            <div class="card">
                <h2>⏳ PURGES EN ATTENTE DE VALIDATION</h2>
                <div id="pendingSubmissions"><div class="loading">⏳ Chargement...</div></div>
            </div>

            <div class="card">
                <h2>📋 TOUTES LES SOUMISSIONS</h2>
                <div id="allSubmissions"><div class="loading">⏳ Chargement...</div></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3yYAuiGqbtrbZ1aSYxAjduZ65adNIpag",
            authDomain: "purge-game-58718.firebaseapp.com",
            databaseURL: "https://purge-game-58718-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "purge-game-58718",
            storageBucket: "purge-game-58718.firebasestorage.app",
            messagingSenderId: "554574972856",
            appId: "1:554574972856:web:9de17e7f77eb7b5be4b14d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const ADMIN_PIN = "2007";
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        function checkPin() {
            const pin = document.getElementById('pinCode').value;
            if(pin === ADMIN_PIN) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadPendingSubmissions();
                loadAllSubmissions();
            } else {
                document.getElementById('loginError').innerText = '❌ Code incorrect';
            }
        }
        
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadPendingSubmissions();
            loadAllSubmissions();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        async function loadPendingSubmissions() {
            const snapshot = await database.ref('submissions').orderByChild('status').equalTo('pending').once('value');
            const submissions = [];
            snapshot.forEach(child => submissions.push({ id: child.key, ...child.val() }));
            
            const container = document.getElementById('pendingSubmissions');
            if(submissions.length === 0) {
                container.innerHTML = '<div class="loading">✅ Aucune purge en attente</div>';
                document.getElementById('statPending').innerText = '0';
                return;
            }
            
            document.getElementById('statPending').innerText = submissions.length;
            
            container.innerHTML = submissions.map(sub => `
                <div class="clan-card">
                    <div class="clan-name">⚔️ ${escapeHtml(sub.clanName)}</div>
                    <div style="margin:10px 0;"><strong>🔗 Lien:</strong> <a href="${escapeHtml(sub.link)}" target="_blank" style="color:#FFD700;">${escapeHtml(sub.link)}</a></div>
                    <div class="photos-preview">
                        ${sub.photos.map(photo => `<img src="${photo}" onclick="window.open('${photo}')">`).join('')}
                    </div>
                    <div style="font-size:0.7em; color:#888;">Soumis le ${new Date(sub.submittedAt).toLocaleString()}</div>
                    <div class="admin-actions">
                        <input type="number" id="points_${sub.id}" placeholder="Points" style="width:100px;">
                        <button onclick="approveSubmission('${sub.id}')" style="background:#27ae60;">✅ Approuver</button>
                        <button onclick="rejectSubmission('${sub.id}')" style="background:#c0392b;">❌ Rejeter</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadAllSubmissions() {
            const snapshot = await database.ref('submissions').once('value');
            const submissions = [];
            snapshot.forEach(child => submissions.push({ id: child.key, ...child.val() }));
            submissions.reverse();
            
            const container = document.getElementById('allSubmissions');
            if(submissions.length === 0) {
                container.innerHTML = '<div class="loading">📭 Aucune soumission</div>';
                return;
            }
            
            let approved = 0, rejected = 0;
            submissions.forEach(s => {
                if(s.status === 'approved') approved++;
                if(s.status === 'rejected') rejected++;
            });
            document.getElementById('statApproved').innerText = approved;
            document.getElementById('statRejected').innerText = rejected;
            
            container.innerHTML = submissions.map(sub => `
                <div class="clan-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                        <span class="clan-name">⚔️ ${escapeHtml(sub.clanName)}</span>
                        <span class="status-badge ${sub.status}">${getStatusText(sub.status)}</span>
                    </div>
                    <div style="margin:10px 0;"><strong>🔗 Lien:</strong> <a href="${escapeHtml(sub.link)}" target="_blank" style="color:#FFD700;">${escapeHtml(sub.link)}</a></div>
                    <div class="photos-preview">
                        ${sub.photos ? sub.photos.map(photo => `<img src="${photo}" onclick="window.open('${photo}')">`).join('') : ''}
                    </div>
                    <div style="font-size:0.7em; color:#888;">Soumis le ${new Date(sub.submittedAt).toLocaleString()}</div>
                    ${sub.status === 'approved' ? `<div style="margin-top:10px; color:#2ecc71;">🏆 Points attribués: +${sub.points}</div>` : ''}
                    ${sub.status === 'rejected' ? `<div style="margin-top:10px; color:#ff8888;">❌ Rejeté: ${sub.rejectReason || ''}</div>` : ''}
                </div>
            `).join('');
        }
        
        async function approveSubmission(id) {
            const points = parseInt(document.getElementById(`points_${id}`).value);
            if(isNaN(points) || points <= 0) {
                alert("Entrez un nombre de points valide");
                return;
            }
            
            const submissionRef = database.ref(`submissions/${id}`);
            const submission = (await submissionRef.once('value')).val();
            
            if(submission) {
                await submissionRef.update({ status: 'approved', points: points, approvedAt: Date.now() });
                
                const clanRef = database.ref(`clans/${submission.clanId}`);
                const clan = (await clanRef.once('value')).val();
                if(clan) {
                    await clanRef.update({
                        score_year: (clan.score_year || 0) + points,
                        score_month: (clan.score_month || 0) + points,
                        score_week: (clan.score_week || 0) + points
                    });
                }
                
                alert(`✅ Purge approuvée ! +${points} points pour ${submission.clanName}`);
                loadPendingSubmissions();
                loadAllSubmissions();
            }
        }
        
        async function rejectSubmission(id) {
            const reason = prompt("Raison du rejet :");
            if(reason) {
                await database.ref(`submissions/${id}`).update({ status: 'rejected', rejectReason: reason, rejectedAt: Date.now() });
                alert("❌ Purge rejetée");
                loadPendingSubmissions();
                loadAllSubmissions();
            }
        }
        
        function getStatusText(status) {
            switch(status) {
                case 'pending': return '⏳ En attente';
                case 'approved': return '✅ Approuvé';
                case 'rejected': return '❌ Rejeté';
                default: return '❓ Inconnu';
            }
        }
        
        setInterval(() => {
            if(document.getElementById('adminPanel').style.display !== 'none') {
                loadPendingSubmissions();
                loadAllSubmissions();
            }
        }, 10000);
    </script>
</body>
</html>
